name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  formal-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lean
        shell: bash
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Reject incomplete formal proofs
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '(^|[^[:alnum:]_])(sorry|admit|axiom)([^[:alnum:]_]|$)' formal/riddle-proof-kernel --include='*.lean'; then
            echo "Formal kernel contains a prohibited proof placeholder."
            exit 1
          fi

      - name: Build formal kernel
        run: |
          cd formal/riddle-proof-kernel
          lake build
