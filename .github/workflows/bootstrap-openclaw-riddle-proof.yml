name: Bootstrap OpenClaw Riddle Proof Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter @riddledc/openclaw-riddle-proof build

      - name: Publish bootstrap package
        run: pnpm --filter @riddledc/openclaw-riddle-proof publish --access public --tag bootstrap --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN2 }}
