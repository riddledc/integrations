name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  statuses: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Release Pull Request
        if: steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          sha="$(git rev-parse HEAD)"

          post_status() {
            gh api "repos/${GH_REPO}/statuses/${sha}" \
              -f state="$1" \
              -f context="release-pr-ci" \
              -f description="$2" \
              -f target_url="${RUN_URL}" >/dev/null
          }

          finish() {
            status="$?"
            if [ "$status" -eq 0 ]; then
              post_status success "Release PR validation passed"
            else
              post_status failure "Release PR validation failed"
            fi
            exit "$status"
          }

          post_status pending "Validating release PR"
          trap finish EXIT

          pnpm install --frozen-lockfile
          pnpm build
          pnpm test

      - name: Upgrade npm for Trusted Publishing
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: npm install -g npm@latest

      - name: Publish to npm with provenance
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm release --provenance
