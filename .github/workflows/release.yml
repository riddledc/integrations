name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  formal-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lean
        shell: bash
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify formal kernel
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '(^|[^[:alnum:]_])(sorry|admit|axiom)([^[:alnum:]_]|$)' formal/riddle-proof-kernel --include='*.lean'; then
            echo "Formal kernel contains a prohibited proof placeholder."
            exit 1
          fi
          cd formal/riddle-proof-kernel
          lake build

  release:
    needs: formal-kernel
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Release Pull Request
        if: steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          sha="$(git rev-parse HEAD)"

          post_status() {
            gh api "repos/${GH_REPO}/statuses/${sha}" \
              -f state="$1" \
              -f context="$2" \
              -f description="$3" \
              -f target_url="${RUN_URL}" >/dev/null
          }

          post_release_statuses() {
            post_status "$1" "release-pr-ci" "$2"
            post_status "$1" "build-test" "$3"
          }

          finish() {
            status="$?"
            if [ "$status" -eq 0 ]; then
              post_release_statuses success "Release PR validation passed" "Release PR build/test passed"
            else
              post_release_statuses failure "Release PR validation failed" "Release PR build/test failed"
            fi
            exit "$status"
          }

          post_release_statuses pending "Validating release PR" "Running release PR build/test"
          trap finish EXIT

          pnpm install --frozen-lockfile
          pnpm build
          pnpm test

      - name: Upgrade npm for Trusted Publishing
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: npm install -g npm@11.5.2

      - name: Test exact publish commit
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm test

      - name: Publish to npm with provenance
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm release --provenance
